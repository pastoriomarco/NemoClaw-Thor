#
# Session-only additions for controlled troubleshooting and package resolution.
# Apply with the helper so the additions are merged into the active sandbox
# policy instead of replacing it:
#   ./apply-policy-additions.sh research-lite [--sandbox-name <name>]
#
# This is intentionally narrower than "full internet".

version: 1

network_policies:
  github_research:
    name: github_research
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
      - host: raw.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/python3 }

  docs_research:
    name: docs_research
    endpoints:
      - host: docs.openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
      - host: docs.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/python3 }
      - { path: /usr/local/bin/openclaw }

  python_packages:
    name: python_packages
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/python3 }
      - { path: /usr/local/bin/pip }
      - { path: /usr/local/bin/pip3 }
      - { path: /usr/local/bin/uv }

  js_packages:
    name: js_packages
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
      - host: registry.yarnpkg.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
    binaries:
      - { path: /usr/local/bin/npm }
      - { path: /usr/local/bin/node }
