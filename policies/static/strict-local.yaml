# Strict local-only baseline for this fork.
# Goal: no external egress from the sandbox at creation time.
# If the agent needs temporary network access later, add it explicitly with
# a dynamic policy update or approve one-off requests in `openshell term`.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies: {}
