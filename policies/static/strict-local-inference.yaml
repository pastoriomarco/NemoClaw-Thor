#
# Strict local-only baseline with inference endpoint.
# No external egress at creation time. Only the local inference
# endpoint is permitted (OpenShell provider route → host vLLM).
#
# Note: OpenShell policy enforcement is application-level only.
# Kernel-level enforcement requires the iptables egress firewall
# (lib/egress-firewall.sh), which is applied automatically by
# configure-local-provider.sh and enforce-egress-firewall.sh.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  local_inference:
    name: local_inference
    endpoints:
      - host: host.openshell.internal
        port: 8000
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/python3 }
